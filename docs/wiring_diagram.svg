<svg width="900" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">
    SkySweep32 Wiring Diagram
  </text>
  
  <!-- ESP32 Board (Center) -->
  <rect x="350" y="300" width="200" height="100" fill="#1a1a2e" stroke="#16213e" stroke-width="3" rx="5"/>
  <text x="450" y="340" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">
    ESP32
  </text>
  <text x="450" y="365" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#aaa">
    DevKit
  </text>
  
  <!-- CC1101 Module (Top Left) -->
  <rect x="50" y="80" width="140" height="80" fill="#0f3460" stroke="#16213e" stroke-width="2" rx="5"/>
  <text x="120" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    CC1101
  </text>
  <text x="120" y="130" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#aaa">
    900 MHz
  </text>
  <text x="120" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e94560">
    CS: GPIO 5
  </text>
  
  <!-- NRF24L01+ Module (Top Right) -->
  <rect x="710" y="80" width="140" height="80" fill="#0f3460" stroke="#16213e" stroke-width="2" rx="5"/>
  <text x="780" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    NRF24L01+
  </text>
  <text x="780" y="130" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#aaa">
    2.4 GHz
  </text>
  <text x="780" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e94560">
    CS: GPIO 17
  </text>
  
  <!-- RX5808 Module (Bottom Left) -->
  <rect x="50" y="540" width="140" height="80" fill="#0f3460" stroke="#16213e" stroke-width="2" rx="5"/>
  <text x="120" y="570" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    RX5808
  </text>
  <text x="120" y="590" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#aaa">
    5.8 GHz
  </text>
  <text x="120" y="605" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e94560">
    CS: GPIO 16
  </text>
  
  <!-- OLED Display (Bottom Right) -->
  <rect x="710" y="540" width="140" height="80" fill="#533483" stroke="#16213e" stroke-width="2" rx="5"/>
  <text x="780" y="570" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">
    OLED
  </text>
  <text x="780" y="590" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#aaa">
    128x64 I2C
  </text>
  <text x="780" y="605" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4ecca3">
    SDA/SCL
  </text>
  
  <!-- SPI Connections to CC1101 -->
  <line x1="190" y1="120" x2="350" y2="320" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="200" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">MOSI (23)</text>
  
  <line x1="190" y1="130" x2="350" y2="340" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">MISO (19)</text>
  
  <line x1="190" y1="140" x2="350" y2="360" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">SCK (18)</text>
  
  <line x1="190" y1="150" x2="350" y2="380" stroke="#e94560" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="250" y="260" font-family="Arial, sans-serif" font-size="10" fill="#e94560">CS (5)</text>
  
  <!-- SPI Connections to NRF24L01+ -->
  <line x1="710" y1="120" x2="550" y2="320" stroke="#2196F3" stroke-width="2"/>
  <text x="650" y="200" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">MOSI (23)</text>
  
  <line x1="710" y1="130" x2="550" y2="340" stroke="#2196F3" stroke-width="2"/>
  <text x="650" y="220" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">MISO (19)</text>
  
  <line x1="710" y1="140" x2="550" y2="360" stroke="#2196F3" stroke-width="2"/>
  <text x="650" y="240" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">SCK (18)</text>
  
  <line x1="710" y1="150" x2="550" y2="380" stroke="#e94560" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="650" y="260" font-family="Arial, sans-serif" font-size="10" fill="#e94560">CS (17)</text>
  
  <!-- SPI Connections to RX5808 -->
  <line x1="190" y1="580" x2="350" y2="400" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="480" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">MOSI (23)</text>
  
  <line x1="190" y1="590" x2="360" y2="400" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="500" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">MISO (19)</text>
  
  <line x1="190" y1="600" x2="370" y2="400" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="520" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">SCK (18)</text>
  
  <line x1="190" y1="610" x2="380" y2="400" stroke="#e94560" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="250" y="540" font-family="Arial, sans-serif" font-size="10" fill="#e94560">CS (16)</text>
  
  <!-- I2C Connections to OLED -->
  <line x1="710" y1="580" x2="550" y2="400" stroke="#4ecca3" stroke-width="2"/>
  <text x="650" y="480" font-family="Arial, sans-serif" font-size="10" fill="#4ecca3">SDA (21)</text>
  
  <line x1="710" y1="590" x2="540" y2="400" stroke="#4ecca3" stroke-width="2"/>
  <text x="650" y="500" font-family="Arial, sans-serif" font-size="10" fill="#4ecca3">SCL (22)</text>
  
  <!-- Legend -->
  <rect x="20" y="650" width="860" height="40" fill="#f5f5f5" stroke="#ccc" stroke-width="1" rx="3"/>
  <line x1="40" y1="670" x2="80" y2="670" stroke="#2196F3" stroke-width="3"/>
  <text x="90" y="675" font-family="Arial, sans-serif" font-size="11" fill="#333">SPI Bus (Shared)</text>
  
  <line x1="240" y1="670" x2="280" y2="670" stroke="#e94560" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="290" y="675" font-family="Arial, sans-serif" font-size="11" fill="#333">Chip Select (Individual)</text>
  
  <line x1="520" y1="670" x2="560" y2="670" stroke="#4ecca3" stroke-width="3"/>
  <text x="570" y="675" font-family="Arial, sans-serif" font-size="11" fill="#333">I2C Bus</text>
</svg>
