[platformio]
default_envs = esp32dev_standard

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
board_build.partitions = huge_app.csv

lib_deps = 
    olikraus/U8g2@^2.35.9
    SPI
    Wire
    bblanchon/ArduinoJson@^7.0.4
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    mikalhart/TinyGPSPlus@^1.0.3
    jgromes/RadioLib@^6.6.0

; ============================================================================
; ENVIRONMENTS FOR AUTOMATED RELEASE BUILDS
; ============================================================================

[env:esp32dev_base]
build_flags = -DTIER_BASE

[env:esp32dev_standard]
build_flags = -DTIER_STANDARD

[env:esp32dev_pro]
build_flags = -DTIER_PRO
; To enable optional modules, add them here: 
; build_flags = -DTIER_PRO -DMODULE_ACOUSTIC -DENABLE_COUNTERMEASURES
