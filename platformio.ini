[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

; ============================================================================
; TIER SELECTION
; Uncomment ONE line to select your hardware configuration:
; ============================================================================

; build_flags = -DTIER_BASE             ; ESP32 + OLED + NRF24 (~$15-20)
; build_flags = -DTIER_STANDARD         ; + CC1101 + RX5808 (~$35-45)
; build_flags = -DTIER_PRO              ; + GPS + SD + LoRa (~$60-80)

; Default: TIER_STANDARD (defined in config.h if nothing specified here)

; ============================================================================
; OPTIONAL MODULES (add to build_flags with -D prefix)
; ============================================================================
; -DMODULE_ACOUSTIC            ; MEMS microphone (~$5)
; -DENABLE_COUNTERMEASURES     ; Active RF countermeasures (LEGAL AUTH REQUIRED!)

; ============================================================================
; DEPENDENCIES
; ============================================================================

lib_deps = 
    olikraus/U8g2@^2.35.9
    SPI
    Wire
    bblanchon/ArduinoJson@^7.0.4
    me-no-dev/ESPAsyncWebServer@^1.2.7
    me-no-dev/AsyncTCP@^1.1.4
    mikalhart/TinyGPSPlus@^1.0.3
    jgromes/RadioLib@^6.6.0

upload_speed = 921600
monitor_filters = esp32_exception_decoder

; Partition scheme for larger apps (web dashboard HTML + all modules)
board_build.partitions = huge_app.csv

; ============================================================================
; EXAMPLE: Full Pro tier with acoustic detection
; ============================================================================
; [env:esp32dev-pro]
; platform = espressif32
; board = esp32dev
; framework = arduino
; build_flags = -DTIER_PRO -DMODULE_ACOUSTIC
; lib_deps = ${env:esp32dev.lib_deps}
; monitor_speed = 115200
; upload_speed = 921600
; board_build.partitions = huge_app.csv
