[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

; Uncomment to enable active countermeasures (LEGAL AUTHORIZATION REQUIRED)
; build_flags = -DENABLE_COUNTERMEASURES

lib_deps = 
    olikraus/U8g2@^2.35.9
    SPI
    Wire
    bblanchon/ArduinoJson@^7.0.4
    me-no-dev/ESPAsyncWebServer@^1.2.7
    me-no-dev/AsyncTCP@^1.1.4
    mikalhart/TinyGPSPlus@^1.0.3
    jgromes/RadioLib@^6.6.0
    https://github.com/tensorflow/tflite-micro-arduino-examples

upload_speed = 921600
monitor_filters = esp32_exception_decoder

; Partition scheme for larger apps (web server + ML model)
board_build.partitions = huge_app.csv
